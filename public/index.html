<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Vote App</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" class="flex flex-col md:flex-row min-h-screen">
        
        <!-- Sidebar: Sessions -->
        <div class="w-full md:w-64 bg-slate-800 text-white p-6">
            <h1 class="text-xl font-bold mb-6">🗳️ Voting Tool</h1>
            <div class="mb-4">
                <input v-model="newSessionName" @keyup.enter="createSession" placeholder="New topic..." 
                       class="w-full p-2 text-black text-sm rounded">
                <button @click="createSession" class="w-full mt-2 bg-blue-600 hover:bg-blue-500 p-2 rounded text-sm font-bold transition">Add Session</button>
            </div>
            <nav>
                <div v-for="s in sessions" :key="s.id" 
                     @click="currentSession = s"
                     :class="['p-3 rounded mb-2 cursor-pointer transition', currentSession?.id === s.id ? 'bg-blue-600' : 'hover:bg-slate-700']">
                    {{ s.name }}
                </div>
            </nav>
        </div>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-10">
            <div v-if="currentSession">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-extrabold text-gray-800">{{ currentSession.name }}</h2>
                </div>

                <!-- Add Item -->
                <div class="flex gap-2 mb-8 bg-white p-4 rounded-lg shadow-sm">
                    <input v-model="newItemText" @keyup.enter="addItem" placeholder="Enter an option..." 
                           class="flex-1 border p-3 rounded-lg outline-blue-500">
                    <button @click="addItem" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-500 transition">Add Item</button>
                </div>

                <!-- Items List -->
                <div class="space-y-4">
                    <div v-for="item in items" :key="item.id" 
                         class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between transition hover:shadow-md">
                        <span class="text-lg font-medium text-gray-700">{{ item.text }}</span>
                        
                        <div class="flex items-center gap-4 bg-gray-50 p-2 rounded-lg">
                            <button @click="vote(item.id, 1)" 
                                    :class="['w-10 h-10 rounded-full flex items-center justify-center transition shadow-sm', 
                                             item.user_vote === 1 ? 'bg-green-500 text-white scale-110' : 'bg-white hover:bg-green-100 text-green-600']">
                                ▲
                            </button>
                            
                            <span :class="['font-bold text-xl min-w-[1.5rem] text-center', 
                                          item.score > 0 ? 'text-green-600' : item.score < 0 ? 'text-red-600' : 'text-gray-400']">
                                {{ item.score || 0 }}
                            </span>

                            <button @click="vote(item.id, -1)" 
                                    :class="['w-10 h-10 rounded-full flex items-center justify-center transition shadow-sm', 
                                             item.user_vote === -1 ? 'bg-red-500 text-white scale-110' : 'bg-white hover:bg-red-100 text-red-600']">
                                ▼
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div v-else class="h-full flex items-center justify-center text-gray-400">
                <p class="text-xl italic">Select or create a session on the left to start voting.</p>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        if (!localStorage.voterID) localStorage.voterID = Math.random().toString(36).substring(2);

        createApp({
            data() {
                return {
                    sessions: [],
                    currentSession: null,
                    items: [],
                    newSessionName: '',
                    newItemText: ''
                }
            },
            watch: {
                currentSession() { this.fetchItems(); }
            },
            methods: {
                async fetchSessions() {
                    const res = await fetch('/api/sessions');
                    this.sessions = await res.json();
                },
                async createSession() {
                    if (!this.newSessionName) return;
                    await fetch('/api/sessions', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ name: this.newSessionName })
                    });
                    this.newSessionName = '';
                    this.fetchSessions();
                },
                async fetchItems() {
                    if (!this.currentSession) return;
                    const res = await fetch(`/api/sessions/${this.currentSession.id}/items?voter_id=${localStorage.voterID}`);
                    this.items = await res.json();
                },
                async addItem() {
                    if (!this.newItemText || !this.currentSession) return;
                    await fetch('/api/items', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ session_id: this.currentSession.id, text: this.newItemText })
                    });
                    this.newItemText = '';
                    this.fetchItems();
                },
                async vote(id, val) {
                    await fetch('/api/vote', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ item_id: id, voter_id: localStorage.voterID, value: val })
                    });
                    this.fetchItems();
                }
            },
            mounted() { this.fetchSessions(); }
        }).mount('#app');
    </script>
</body>
</html>
